name: Keep Render Awake

on:
  schedule:
    # 10분마다 자동 실행 (UTC 기준, 한국 시간 무관)
    - cron: '*/10 * * * *'
  workflow_dispatch: # GitHub에서 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping committee-platform.onrender.com
        run: |
          echo "Pinging at $(date -u)"
          curl -fsS -o /dev/null -w "HTTP %{http_code} | %{time_total}s\n" \
            https://committee-platform.onrender.com/admin/login || echo "ping failed (skipping)"
